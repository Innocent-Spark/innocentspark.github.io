    <script async defer>
        // set a timeout to ensure the canvas is loaded
        setTimeout(function () {
            var experienceElement = document.querySelector('canvas');
            console.log('experienceElement', experienceElement);

            var events = [
                'pointerdown', 'pointerup',  'pointerout',
                'pointerenter', 'pointerleave', 'mousedown', 'touchstart',
                'touchmove', 'touchend', 'dragstart', 'drag', 'dragend'
            ];

            events.forEach(function (eventType) {
                experienceElement.addEventListener(eventType, function (event) {
                    event.preventDefault();
                    event.stopPropagation();
                }, { passive: false });
            });
        }, 500);
    </script>
